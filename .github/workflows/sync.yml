name: Sync packages with Patches
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq rsync patch

      - name: Sync and Patch
        env:
          MANIFEST: feedsync.json
        run: |
          set -euo pipefail

          count=$(jq '.packages | length' "$MANIFEST")
          
          for i in $(seq 0 $((count-1))); do
            name=$(jq -r ".packages[$i].name" "$MANIFEST")
            repo=$(jq -r ".packages[$i].repo" "$MANIFEST")
            branch=$(jq -r ".packages[$i].branch // \"main\"" "$MANIFEST")
            src=$(jq -r ".packages[$i].src // \".\"" "$MANIFEST")
            # 强制同步到 packages/ 目录下
            dest="packages/$name"

            echo "==> Processing $name"

            # 1. 克隆上游
            tmp=$(mktemp -d)
            git clone --depth=1 -b "$branch" "$repo" "$tmp"

            # 2. 彻底同步（先删再拷，确保上游删了本地也删）
            rm -rf "$dest"
            mkdir -p "$dest"
            rsync -av --exclude ".git" "$tmp/$src/" "$dest/"
            rm -rf "$tmp"

            # 3. 自动应用补丁
            patch_dir="patches/$name"
            if [ -d "$patch_dir" ]; then
              echo "Applying patches for $name..."
              for p in $(ls "$patch_dir"/*.patch 2>/dev/null | sort); do
                echo "Applying $p"
                
                # 尝试用 -p3 (适用于在根目录 git diff 生成的补丁)
                # 如果 -p3 失败，尝试 -p1 (适用于在插件目录内生成的补丁)
                if patch -p3 -d "$dest" --dry-run < "$p" > /dev/null 2>&1; then
                  patch -p3 -d "$dest" < "$p"
                elif patch -p1 -d "$dest" --dry-run < "$p" > /dev/null 2>&1; then
                  patch -p1 -d "$dest" < "$p"
                else
                  echo "::error::Patch $p 应用失败！请检查路径层级或代码冲突。"
                fi
              done
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(feed): sync and apply patches"
          branch: sync-upstream-with-patches
          delete-branch: true
          title: "🔄 上游插件同步：含自动补丁应用"
          body: |
            ### 自动化同步报告
            - **上游同步**：已完成（采用彻底覆盖模式）。
            - **自定义补丁**：已尝试应用 `patches/` 目录下的补丁。
            
